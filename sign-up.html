<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheets/style.css">
    <script src="scripts/login.js"></script>
    <title>Sign Up to Org Find</title>
</head>
<body>
    

    <div class="container">
        
        <div class="signUp active" id="signUp">
            <div >
                <h1>Sign Up</h1>
 
                <form action="">
                    
                    <div style="display: flex; gap: 10px;">
                        <div class="field">
                        <label for="firstname">First Name:</label>
                            <input type="text" id="firstname" name="firstname" placeholder="Juan">
                        </div>
                        <div class="field">
                        <label for="lastname">Last Name:</label>
                            
                            <input type="text" id="lastname" name="lastname" placeholder="Dela Cruz">
                        </div>
                    </div>  
                    <div class="field">
                        <label for="email">Email:</label>
                        <input type="text" id="email" name="email" placeholder="example@cvsu.edu.ph">
                    </div>
                    <div class="field">
                        <label for="password">Create Your Password:</label>
                        <input type="password" id="email" name="email" placeholder="A Strong Password">
                    </div>
                    <div class="field">
                        <label for="password">Confirm Your Password:</label>
                        <input type="password" id="email" name="email" placeholder="Re-enter your password">
                    </div>

                    <div class="options">
                        <input type="submit" value="Sign In">
                    </div>
                </form>
                <p> Already have an account?
                    <button type="button" onclick="showLogin()">Log In</button>
                </p>
            </div>
        </div>
        <div class="logIn " id="logIn">
            
                <h1>Log In</h1>
                <form action="">
                    <div class="field">
                        <label for="email">Email:</label>
                        <input type="text" id="email" name="email" placeholder="example@cvsu.edu.ph">
                    </div>
                    <div class="field">
                        <label for="password">Enter Your Password</label>
                        <div id="passinputcon">
                            <input type="password" id="password" name="password" placeholder="Enter Password">        
                            <div id="ShowPassButton" onclick="TogglePasswordVisibility()"></div>
                        </div>
                    </div>
                    <div class="options">   
                        <input type="submit" value="Sign In">
                    </div>
                </form>
                <p>Need an account?
                    <button type="button" onclick="showSignUp()">Sign Up</button>
                </p>
        </div>  
    </div>
</body>
</html>
