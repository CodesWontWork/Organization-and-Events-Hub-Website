<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheets/style.css">
    <link rel="stylesheet" href="stylesheets/auth.css">
    <title>fahhh</title>
</head>
<body>
    <header class="header-container">
        <div class="header-title-box">
            <img src="images/hub-icon.png" alt="" class="header-logo">
            <div class="header-title">
                <h1>Organization and Events Hub</h1>
                <p>Connecting you to the world of organizations and events</p>
            </div>
        </div>
        <div class="navigation-container">
            <nav class="navigation">
                <a href="index.html" >Home</a>
                <a href="organizations.html">Organizations</a>
                <a href="events.html">Events</a>
                <a href="about.html">About Us</a>
                <a href="login.html" class="active">Log In</a>
            </nav>
            <img src="images/user-icon.png" alt="" class="profile-button" link="login.html">
        </div>
    </header>
    <div class="body-container">
        <div class="container">
            
            <div class="signUp" id="signUp">
                <div >
                    <h1>Sign Up</h1>
    
                    <form action="">
                        
                        <div style="display: flex; gap: 10px;">
                            <div class="field">
                            <label for="firstname">First Name:</label>
                                <input type="text" id="firstname" name="firstname" placeholder="Juan">
                            </div>
                            <div class="field">
                            <label for="lastname">Last Name:</label>
                                <input type="text" id="lastname" name="lastname" placeholder="Dela Cruz">
                            </div>
                        </div>  
                        <div class="field">
                            <label for="email">Email:</label>
                            <input type="email" class="inputs" name="email" placeholder="example@cvsu.edu.ph">
                        </div>
                        <div class="field">
                            <label for="password">Create Your Password:</label>
                            <input type="password" class="inputs" name="password" placeholder="A Strong Password">
                        </div>
                        <div class="field">
                            <label for="password">Confirm Your Password:</label>
                            <input type="password" class="inputs" name="confirm_password" placeholder="Re-enter your password">
                        </div>

                        <div class="options">
                            <input type="submit" value="Sign In">
                        </div>
                    </form>
                    <p> Already have an account?
                        <button type="button" onclick="showLogin()">Log In</button>
                    </p>
                </div>
            </div>
            <div class="logIn active" id="logIn">
                
                    <h1>Log In</h1>
                    <form action="">
                        <div class="field">
                            <label for="email">Email:</label>
                            <input type="email" class="inputs" name="email" placeholder="example@cvsu.edu.ph">
                        </div>
                        <div class="field">
                            <label for="password">Enter Your Password</label>
                            <div id="passinputcontainer">
                                <input type="password" id="password" class="inputs" name="password" placeholder="Enter Password">        
                                <div id="ShowPassButton" onclick="TogglePasswordVisibility()"></div>
                            </div>
                        </div>
                        <div class="options">   
                            <input type="submit" value="Sign In">
                        </div>
                    </form>
                    <p>Need an account?
                        <button type="button" onclick="showSignUp()">Sign Up</button>
                    </p>
            </div>  
        </div>
    </div>
<script src="scripts/auth.js"></script>
</body>
</html>
